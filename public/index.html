<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="theme-color" content="#ffffff" />
<title>互動紀錄</title>
<link rel="manifest" href="/manifest.json" />
<style>
  :root{--bg:#ffffff;--bg2:#f5f5f4;--bg3:#eeece8;--text:#1a1a1a;--text2:#6b6b68;--text3:#a8a8a4;--border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);--radius:10px;--radius-lg:14px;--red:#E24B4A;--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);}
  @media(prefers-color-scheme:dark){:root{--bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18);}}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
  body{font-family:-apple-system,'SF Pro Text',sans-serif;background:var(--bg);color:var(--text);max-width:430px;margin:0 auto;min-height:100dvh}
  button,.main-tab,.fpill,.ch-pill,.contact-item,.track-row,.fold-row,.timeline-content,.sheet-btn,.mini-item{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
  input,textarea,select{user-select:text;-webkit-user-select:text}
  .topbar{padding:calc(var(--safe-top) + 12px) 16px 12px;background:var(--bg);border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
  .topbar-title{font-size:17px;font-weight:600}
  .btn-icon{width:34px;height:34px;border-radius:50%;background:var(--text);color:var(--bg);border:none;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
  .btn-icon.outline{background:var(--bg2);color:var(--text);font-size:16px}
  .search-wrap{padding:10px 16px;background:var(--bg);border-bottom:0.5px solid var(--border);position:relative}
  .search-wrap input{width:100%;padding:9px 12px 9px 36px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);font-size:15px;outline:none}
  .search-wrap input:focus{border-color:var(--text3);background:var(--bg)}
  .search-icon{position:absolute;left:28px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px;pointer-events:none}
  .filter-row{display:flex;gap:7px;padding:8px 16px;overflow-x:auto;scrollbar-width:none;border-bottom:0.5px solid var(--border)}
  .filter-row::-webkit-scrollbar{display:none}
  .fpill{padding:5px 13px;border-radius:20px;font-size:13px;cursor:pointer;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);white-space:nowrap;transition:all .15s}
  .fpill.on{background:var(--text);color:var(--bg);border-color:var(--text)}
  .stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 16px}
  .stat{background:var(--bg2);border-radius:var(--radius);padding:10px 12px}
  .stat.clickable{cursor:pointer}
  .stat.clickable:active{opacity:.75}
  .stat-n{font-size:24px;font-weight:600}
  .stat-l{font-size:12px;color:var(--text2);margin-top:2px}
  .contact-item{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:0.5px solid var(--border);cursor:pointer;transition:background .1s}
  .contact-item:active{background:var(--bg2)}
  .contact-item:last-child{border-bottom:none}
  .avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;flex-shrink:0}
  .contact-info{flex:1;min-width:0}
  .contact-name{font-size:15px;font-weight:500}
  .contact-sub{font-size:13px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ch-badge{font-size:11px;padding:3px 9px;border-radius:12px;white-space:nowrap;flex-shrink:0;font-weight:500}
  .empty-state{padding:48px 16px;text-align:center;color:var(--text3);font-size:14px;line-height:1.8}
  .panel{padding:0 0 calc(var(--safe-bot) + 80px)}
  .panel-header{padding:calc(var(--safe-top) + 12px) 16px 12px;display:flex;align-items:center;gap:10px;border-bottom:0.5px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:10}
  .btn-back{background:var(--bg2);border:0.5px solid var(--border2);border-radius:var(--radius);padding:7px 12px;font-size:13px;color:var(--text2);cursor:pointer}
  .panel-title{font-size:16px;font-weight:600;flex:1}
  .field-group{padding:0 16px}
  .field-row{margin-bottom:14px}
  .field-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
  .field-value{font-size:15px;color:var(--text);line-height:1.6}
  .field-input{width:100%;padding:10px 12px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);font-size:15px;font-family:inherit;outline:none;transition:border-color .15s,background .15s}
  .field-input:focus{border-color:var(--text2);background:var(--bg)}
  textarea.field-input{resize:none;line-height:1.5}
  .ch-pills{display:flex;gap:7px;flex-wrap:wrap}
  .ch-pill{padding:6px 13px;border-radius:20px;font-size:13px;cursor:pointer;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);transition:all .15s}
  .ch-pill.on{background:var(--text);color:var(--bg);border-color:var(--text)}
  .divider{border:none;border-top:0.5px solid var(--border);margin:16px 0}
  .btn-primary{width:calc(100% - 32px);margin:0 16px;padding:14px;border-radius:var(--radius-lg);background:var(--text);color:var(--bg);font-size:15px;font-weight:600;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s}
  .btn-primary:active{opacity:.75}
  .btn-primary:disabled{opacity:.4;cursor:default}
  .btn-secondary{width:calc(100% - 32px);margin:10px 16px 0;padding:12px;border-radius:var(--radius-lg);background:none;color:var(--text2);font-size:15px;border:0.5px solid var(--border2);cursor:pointer}
  .detail-avatar{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:600;margin:20px auto 10px}
  .detail-name{font-size:20px;font-weight:600;text-align:center;margin-bottom:6px}
  .detail-meta{text-align:center;margin-bottom:16px}
  .add-log-btn{display:flex;align-items:center;gap:8px;padding:12px 16px;font-size:14px;color:var(--text2);cursor:pointer;border-top:0.5px solid var(--border);margin-top:4px}
  .setup-screen{padding:40px 24px;display:flex;flex-direction:column;align-items:center;min-height:100dvh}
  .setup-logo{width:56px;height:56px;background:var(--text);border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:20px}
  .setup-logo span{color:var(--bg);font-size:22px;font-weight:700}
  .setup-title{font-size:22px;font-weight:700;margin-bottom:8px;text-align:center}
  .setup-sub{font-size:14px;color:var(--text2);text-align:center;margin-bottom:32px;line-height:1.6}
  .setup-note{font-size:12px;color:var(--text3);margin-top:16px;line-height:1.7;text-align:center}
  .toast{position:fixed;bottom:calc(var(--safe-bot) + 24px);left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:var(--bg);padding:11px 20px;border-radius:24px;font-size:14px;font-weight:500;transition:transform .3s ease;z-index:99;white-space:nowrap;pointer-events:none}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .toast.err{background:var(--red)}
  .mini-frame{position:fixed;left:16px;right:16px;bottom:calc(var(--safe-bot) + 18px);max-width:398px;margin:0 auto;background:var(--bg);border:1px solid var(--border2);border-radius:18px;box-shadow:0 12px 38px rgba(0,0,0,.18);z-index:120;display:none;overflow:hidden}
  .mini-frame.show{display:block}
  .mini-head{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;border-bottom:1px solid var(--border);font-weight:800}
  .mini-close{border:none;background:var(--bg2);border-radius:50%;width:30px;height:30px;font-size:18px;color:var(--text2);cursor:pointer}
  .mini-list{max-height:45vh;overflow:auto}
  .mini-item{padding:12px 15px;border-bottom:1px solid var(--border)}
  .mini-item:last-child{border-bottom:none}
  .mini-name{font-weight:800;font-size:14px}
  .mini-talk{font-size:13px;color:var(--text2);line-height:1.5;margin-top:4px}
  .mini-meta{font-size:12px;color:var(--text3);margin-top:4px}
  .action-sheet{position:fixed;left:0;right:0;bottom:0;z-index:140;display:none}
  .action-sheet.show{display:block}
  .sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.16)}
  .sheet-panel{position:relative;margin:0 auto;padding:8px 12px calc(var(--safe-bot) + 12px);max-width:430px;background:var(--bg);border-radius:18px 18px 0 0;box-shadow:0 -12px 34px rgba(0,0,0,.16)}
  .sheet-title{padding:11px 8px 12px;font-size:13px;color:var(--text2);font-weight:600;text-align:center;border-bottom:0.5px solid var(--border)}
  .sheet-btn{width:100%;padding:14px;border:none;background:var(--bg);font-size:15px;font-weight:600;color:var(--text);cursor:pointer;border-bottom:0.5px solid var(--border);font-family:inherit}
  .sheet-btn.danger{color:var(--red)}
  .sheet-btn.cancel{margin-top:8px;border:0.5px solid var(--border2);border-radius:var(--radius-lg);background:var(--bg2);color:var(--text2)}
  .spinner{width:20px;height:20px;border:2px solid rgba(255,255,255,0.3);border-top-color:var(--bg);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .sync-dot{width:8px;height:8px;border-radius:50%;background:#ccc;transition:background .3s}
  .sync-dot.ok{background:#4CAF50}.sync-dot.loading{background:#FFC107}.sync-dot.err{background:var(--red)}
  .fab-area{position:fixed;bottom:calc(var(--safe-bot) + 20px);right:20px}
  .fab{width:52px;height:52px;border-radius:50%;background:var(--text);color:var(--bg);border:none;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;box-shadow:0 2px 8px rgba(0,0,0,0.2)}
  .customer-wrap{position:relative}
  .customer-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--radius);z-index:30;overflow:hidden}
  .cust-opt{padding:11px 14px;cursor:pointer;font-size:14px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:8px}
  .cust-opt:last-child{border-bottom:none}
  .cust-opt:active{background:var(--bg2)}
  .cust-opt-new{color:var(--text2);font-style:italic}
  .cust-selected{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--bg2);border-radius:var(--radius);border:0.5px solid var(--border2)}
  .cust-selected-name{font-size:14px;font-weight:500;flex:1}
  .cust-clear{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;line-height:1;padding:0 2px}
  .cust-hint{font-size:12px;color:var(--text3);margin-top:5px}
  .main-tabs{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;scrollbar-width:none;border-bottom:0.5px solid var(--border)}
  .main-tabs::-webkit-scrollbar{display:none}
  .main-tab{padding:8px 15px;border-radius:22px;font-size:14px;font-weight:600;border:0.5px solid var(--border2);background:var(--bg);color:var(--text2);white-space:nowrap;cursor:pointer}
  .main-tab.on{background:var(--text);color:var(--bg);border-color:var(--text)}
  .today-card{margin:14px 16px 90px;border:0.5px solid var(--border);border-radius:18px;overflow:hidden;background:var(--bg)}
  .today-head{display:flex;align-items:center;justify-content:space-between;padding:15px 16px;border-bottom:0.5px solid var(--border)}
  .today-title{font-size:20px;font-weight:700}
  .today-count{font-size:14px;color:var(--text2);font-weight:600}
  .grade-tabs{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:0.5px solid var(--border)}
  .grade-tab{padding:11px 0;text-align:center;font-size:14px;font-weight:600;color:var(--text2);cursor:pointer}
  .grade-tab.on{color:var(--text);box-shadow:inset 0 -2px 0 var(--text)}
  .grade-section-label{padding:10px 16px 5px;font-size:13px;font-weight:700;color:#7a3f05;background:linear-gradient(90deg,rgba(250,238,218,.45),transparent)}
  .grade-section-label.hot{color:#a92c2c;background:linear-gradient(90deg,rgba(250,236,231,.55),transparent)}
  .track-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:0.5px solid var(--border);cursor:pointer}
  .track-row:active{background:var(--bg2)}
  .track-main{flex:1;min-width:0}
  .track-name{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .track-sub{font-size:13px;color:var(--text2);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .due-badge{font-size:12px;font-weight:700;border-radius:14px;padding:4px 9px;white-space:nowrap;background:#FAEEDA;color:#7a3f05}
  .due-badge.hot{background:#FAECE7;color:#a92c2c}
  .due-badge.ok{background:#EAF3DE;color:#3B6D11}
  .fold-row{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;background:var(--bg2);border-bottom:0.5px solid var(--border);font-size:15px;font-weight:700;color:var(--text2);cursor:pointer}
  .list-note{padding:12px 16px;color:var(--text2);font-size:13px;line-height:1.6;background:var(--bg2);border-bottom:0.5px solid var(--border)}
  .edit-shell{padding:calc(var(--safe-top) + 16px) 16px calc(var(--safe-bot) + 88px);background:var(--bg);min-height:100dvh}
  .edit-kicker{font-size:12px;color:var(--text3);font-weight:600;margin-bottom:6px}
  .edit-title{font-size:22px;font-weight:700;line-height:1.25;margin-bottom:18px;color:var(--text);letter-spacing:0}
  .edit-grid{display:grid;grid-template-columns:1fr;gap:14px}
  .edit-field label{display:block;font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
  .edit-input{width:100%;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);font-size:15px;font-weight:500;padding:10px 12px;outline:none;font-family:inherit;transition:border-color .15s,background .15s}
  .edit-input:focus{border-color:var(--text2);background:var(--bg);box-shadow:none}
  .edit-input:disabled{color:var(--text2);opacity:1}
  textarea.edit-input{min-height:118px;resize:vertical;line-height:1.5}
  .edit-actions{display:flex;gap:10px;margin-top:18px}
  .edit-actions .btn-secondary,.edit-actions .btn-primary{width:auto;margin:0;flex:1}
  .edit-section{grid-column:1 / -1;font-size:14px;font-weight:700;color:var(--text);border-top:0.5px solid var(--border);padding-top:14px;margin-top:2px}
  .edit-help{font-size:12px;color:var(--text3);margin-top:5px;line-height:1.5}
  .customer-tabs{display:grid;grid-template-columns:1fr 1fr;border:0.5px solid var(--border2);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:18px;background:var(--bg2)}
  .customer-tab{padding:11px 0;text-align:center;font-size:14px;font-weight:600;color:var(--text2);cursor:pointer}
  .customer-tab.on{background:var(--text);color:var(--bg)}
  .customer-panel{display:none}
  .customer-panel.on{display:block}
  .timeline{margin-top:0;border-top:none;padding-top:0}
  .timeline-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px}
  .timeline-title{font-size:17px;font-weight:600}
  .timeline-add{border:0.5px solid var(--border2);background:var(--bg2);border-radius:20px;padding:8px 12px;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;font-family:inherit}
  .timeline-item{border-bottom:0.5px solid var(--border)}
  .timeline-content{padding:13px 0;background:var(--bg);touch-action:manipulation;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
  .timeline-meta{display:flex;gap:8px;align-items:center;margin-bottom:6px;color:var(--text3);font-size:12px;font-weight:700}
  .timeline-talk{font-size:15px;line-height:1.55;color:var(--text)}
  .timeline-next{font-size:13px;line-height:1.5;color:var(--text2);margin-top:5px}
  .timeline-empty{font-size:14px;color:var(--text3);padding:14px 0}
  @media(min-width:700px){
    body{max-width:720px}
    .edit-grid{grid-template-columns:1fr 1fr}
    .edit-field.full{grid-column:1 / -1}
  }
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<div id="today-frame" class="mini-frame">
  <div class="mini-head"><span>今日新增互動</span><button class="mini-close" onclick="hideTodayFrame()">×</button></div>
  <div class="mini-list" id="today-frame-list"></div>
</div>
<div id="interaction-sheet" class="action-sheet">
  <div class="sheet-backdrop" onclick="hideInteractionSheet()"></div>
  <div class="sheet-panel">
    <div class="sheet-title" id="sheet-title">互動操作</div>
    <button class="sheet-btn" onclick="openSheetInteraction()">查看互動</button>
    <button class="sheet-btn danger" onclick="deleteSheetInteraction()">刪除互動</button>
    <button class="sheet-btn cancel" onclick="hideInteractionSheet()">取消</button>
  </div>
</div>

<div id="view-setup" style="display:none">
  <div class="setup-screen">
    <div class="setup-logo"><span>互動</span></div>
    <div class="setup-title">互動紀錄</div>
    <div class="setup-sub">連接你的 Notion 資料庫<br>快速記錄每一次客戶互動</div>
    <div style="width:100%">
      <div class="field-row">
        <div class="field-label">Notion Database ID</div>
        <input class="field-input" id="cfg-db" placeholder="d15d379ecf104e44ac632d973bf36ce5" autocomplete="off" />
      </div>
      <button class="btn-primary" onclick="doConnect()" style="margin:8px 0 0">開始使用</button>
    </div>
    <p class="setup-note">Database ID 在 Notion 資料庫網址中取得</p>
  </div>
</div>

<div id="view-list" style="display:none">
  <div class="topbar">
    <div class="topbar-title">互動紀錄</div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="sync-dot" id="sync-dot"></div>
      <button class="btn-icon outline" onclick="loadContacts()" aria-label="重新整理" style="font-size:15px">↻</button>
    </div>
  </div>
  <div class="main-tabs" id="main-tabs">
    <div class="main-tab on" onclick="setMode('today',this)">今日追蹤</div>
    <div class="main-tab" onclick="setMode('customers',this)">客戶列表</div>
    <div class="main-tab" onclick="setMode('manager',this)">主管看板</div>
  </div>
  <div class="search-wrap" id="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="search" id="search-input" placeholder="搜尋客戶名稱、互動內容..." oninput="renderList()" />
  </div>
  <div class="filter-row" id="channel-filters">
    <div class="fpill on" onclick="setFilter(this,'')">全部</div>
    <div class="fpill" onclick="setFilter(this,'IG')">IG</div>
    <div class="fpill" onclick="setFilter(this,'LINE')">LINE</div>
    <div class="fpill" onclick="setFilter(this,'電話')">電話</div>
    <div class="fpill" onclick="setFilter(this,'見面')">見面</div>
    <div class="fpill" onclick="setFilter(this,'其他')">其他</div>
  </div>
  <div class="stats-row">
    <div class="stat"><div class="stat-n" id="stat-total">—</div><div class="stat-l">總聯絡人</div></div>
    <div class="stat clickable" onclick="showTodayFrame()"><div class="stat-n" id="stat-today" style="color:#3B6D11">—</div><div class="stat-l">今日新增</div></div>
  </div>
  <div id="contacts-list"></div>
  <div class="fab-area">
    <button class="fab" onclick="showView('add')" aria-label="新增">+</button>
  </div>
</div>

<div id="view-add" style="display:none">
  <div class="panel">
    <div class="panel-header">
      <button class="btn-back" onclick="showView('list')">← 返回</button>
      <div class="panel-title">新增互動</div>
    </div>
    <div style="height:16px"></div>
    <div class="field-group">
      <div class="field-row">
        <div class="field-label">客戶 *</div>
        <div class="customer-wrap" id="customer-wrap">
          <div id="cust-selected-view" style="display:none">
            <div class="cust-selected">
              <span class="cust-selected-name" id="cust-selected-name"></span>
              <button class="cust-clear" onclick="clearCustomer()">✕</button>
            </div>
          </div>
          <div id="cust-input-view">

            <div class="cust-hint">輸入名字搜尋現有客戶，或直接輸入新客戶名字</div>

          </div>

      <div class="field-row"><div class="field-label">下次話題</div><textarea class="field-input" id="f-next" rows="2" placeholder="下次見面要聊的事..."></textarea></div>

</div>

<script>
const DB_KEY='notion_crm_db';
const CUSTOMER_DB='342b637dc33580698559d12ce28a67d1';
const CHANNELS=['IG','LINE','電話','見面','其他'];
const AV_COLORS=[{bg:'#E1F5EE',c:'#0F6E56'},{bg:'#EEEDFE',c:'#534AB7'},{bg:'#FAECE7',c:'#993C1D'},{bg:'#FAEEDA',c:'#854F0B'},{bg:'#E6F1FB',c:'#185FA5'}];
const CH_COLORS={'IG':{bg:'#FAEEDA',c:'#854F0B'},'LINE':{bg:'#EAF3DE',c:'#3B6D11'},'電話':{bg:'#E6F1FB',c:'#185FA5'},'見面':{bg:'#EEEDFE',c:'#534AB7'},'其他':{bg:'#f1f1f1',c:'#888'}};
let dbId='',contacts=[],customers=[],filterCh='',mode='today',gradeFilter='A',showC=false,editMode=false,currentId=null,currentCustomerId=null;
let selCustId=null,selCustName='',custTimer=null;
const today=localDate();

function localDate(d=new Date()){
  const dt=d instanceof Date?d:new Date(d);
  const y=dt.getFullYear();
  const m=String(dt.getMonth()+1).padStart(2,'0');
  const day=String(dt.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function initials(n){return(n||'??').trim().slice(0,2).toUpperCase()}
function avColor(n){let h=0;for(let c of(n||''))h=(h*31+c.charCodeAt(0))&0xffff;return AV_COLORS[h%AV_COLORS.length]}
function chColor(ch){return CH_COLORS[ch]||{bg:'#f1f1f1',c:'#888'}}
function esc(v){return String(v??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]))}
function attr(v){return esc(v).replace(/`/g,'&#96;')}
function notionPageUrl(id){return 'https://www.notion.so/'+String(id||'').replace(/-/g,'')}
function normId(id){return String(id||'').replace(/-/g,'')}
function pageTitle(p){
  const props=p.properties||{};
  const titleKey=Object.keys(props).find(k=>props[k].type==='title');
  return titleKey?(props[titleKey].title||[]).map(t=>t.plain_text||'').join('').trim():'';
}
function richText(prop){return (prop?.rich_text||[]).map(t=>t.plain_text||'').join('').trim()}
function emailText(prop){return prop?.email||''}
function urlText(prop){return prop?.url||''}
function selectName(prop){return prop?.select?.name||''}
function multiNames(prop){return (prop?.multi_select||[]).map(x=>x.name).join('、')}
function numberText(prop){return prop?.number===null||prop?.number===undefined?'':String(prop.number)}
function splitOptions(v){return String(v||'').split(/[、,，\n]/).map(x=>x.trim()).filter(Boolean)}
function validUrl(v){return !v||/^https?:\/\//i.test(v)}
function validNumber(v){return !v||!Number.isNaN(Number(v))}
function formulaText(prop){
  const f=prop?.formula;if(!f)return '';
  if(f.type==='string')return f.string||'';
  if(f.type==='date')return f.date?.start||'';
  if(f.type==='number')return String(f.number??'');
  if(f.type==='boolean')return f.boolean?'是':'';
  return '';
}
function daysBetween(dateStr){
  if(!dateStr)return null;
  const a=new Date(today+'T00:00:00');
  const b=new Date(dateStr.slice(0,10)+'T00:00:00');
  if(Number.isNaN(b.getTime()))return null;
  return Math.round((b-a)/86400000);
}
function dueLabel(c){
  const raw=(c.reminder||c.overdue||'').trim();
  const diff=daysBetween(raw);
  if(diff!==null){
    if(diff<0)return {text:`逾期${Math.abs(diff)}天`,tone:'hot'};
    if(diff===0)return {text:'今天',tone:''};
    if(diff===1)return {text:'明天',tone:'ok'};
    return {text:`${diff}天後`,tone:'ok'};
  }
  if(/逾期/.test(raw))return {text:raw.replace('提醒','').trim()||'逾期',tone:'hot'};
  if(/TODAY|今天|提醒/.test(raw))return {text:'今天',tone:''};
  return {text:'追蹤',tone:''};
}
function gradeKey(g){
  if(/^A/.test(g))return 'A';
  if(/^B/.test(g))return 'B';
  if(/^C/.test(g))return 'C';
  if(/^D/.test(g))return 'D';
  return 'C';
}
function openCustomerPage(e,id){
  if(e)e.stopPropagation();
  openCustomerEdit(id);
}
function showView(v){['setup','list','detail','add','customer-edit'].forEach(x=>document.getElementById('view-'+x).style.display='none');document.getElementById('view-'+v).style.display='block';if(v==='list')renderList();if(v==='add')resetAddForm()}
function setMode(next,el){
  mode=next;
  document.querySelectorAll('.main-tab').forEach(t=>t.classList.remove('on'));
  if(el)el.classList.add('on');
  showView('list');
}
function toast(msg,isErr){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(isErr?' err':'');clearTimeout(t._tid);t._tid=setTimeout(()=>t.className='toast',2500)}
function setSyncDot(s){const d=document.getElementById('sync-dot');if(d)d.className='sync-dot '+(s==='ok'?'ok':s==='loading'?'loading':'err')}
async function notionAPI(method,path,body){
  const res=await fetch('/api/notion/'+path,{method,headers:{'Content-Type':'application/json'},body:body?JSON.stringify(body):undefined});
  const data=await res.json().catch(()=>({}));
  if(!res.ok)throw new Error(data.message||data.error||('API '+res.status));
  return data;
}
function doConnect(){const db=document.getElementById('cfg-db').value.trim().replace(/-/g,'');if(!db||db.length<32){toast('請填入正確的 Database ID',true);return}dbId=db;localStorage.setItem(DB_KEY,dbId);showView('list');loadContacts()}

async function loadContacts(){
  setSyncDot('loading');
  try{
    const [data, customerData]=await Promise.all([
      notionAPI('POST',`databases/${dbId}/query`,{page_size:100,sorts:[{timestamp:'created_time',direction:'descending'}]}),
      notionAPI('POST',`databases/${CUSTOMER_DB}/query`,{page_size:100})
    ]);
    const customerNames={};
    customers=(customerData.results||[]).map(p=>{
      const props=p.properties||{};
      const name=pageTitle(p)||'未命名';
      const grade=selectName(props['分級'])||'C級';
      const topic=richText(props['下次見面主題'])||richText(props['預計談什麼'])||multiNames(props['議題'])||'尚未設定追蹤主題';
      const status=multiNames(props['目前進度'])||multiNames(props['商品方向'])||multiNames(props['屬性'])||'';
      return{
        id:p.id,
        created:p.created_time?localDate(p.created_time):'',
        name,
        visitPurpose:multiNames(props['③約訪目的']),
        age:formulaText(props['實際年齡']),
        grade,
        gradeKey:gradeKey(grade),
        family:richText(props['家庭現況']),
        area:richText(props['住家']),
        howMet:emailText(props['怎麼認識']),
        progress:multiNames(props['目前進度']),
        work:emailText(props['工作狀態']),
        invest:emailText(props['投資狀況']),
        competitor:emailText(props['競爭者']),
        decision:richText(props['決策者']),
        policy:urlText(props['現有保單']),
        nextTopic:richText(props['下次見面主題']),
        salary:numberText(props['薪水']),
        goal:richText(props['目標']),
        note:richText(props['配置建議']),
        policySummary:urlText(props['保單統整']),
        policyCheckup:urlText(props['保單健檢']),
        topic,
        status,
        reminder:formulaText(props['建議下次聯絡日'])||formulaText(props['預計約訪日'])||formulaText(props['定聯提醒']),
        overdue:formulaText(props['逾期']),
      };
    });
    (customerData.results||[]).forEach(p=>{
      const name=pageTitle(p);
      if(name) customerNames[normId(p.id)]=name;
    });
    contacts=(data.results||[]).map(p=>{
      const props=p.properties||{};
      const custRel=props['客戶']?.relation||[];
      const customerId=custRel[0]?.id||'';
      const title=pageTitle(p);
      const customerName=customerNames[normId(customerId)]||'';
      return{
        id:p.id,
        name:customerName||title||'未命名',
        customerId,
        channel:props['管道']?.select?.name||'',
        talked:(props['聊了什麼']?.rich_text||[]).map(t=>t.plain_text||'').join('')||'',
        nextTopic:(props['下次話題']?.rich_text||[]).map(t=>t.plain_text||'').join('')||'',
        lastContact:props['最後聯絡日期']?.date?.start||(p.created_time?localDate(p.created_time):today),
        createdTime:p.created_time||'',
        created:p.created_time?localDate(p.created_time):today,
      };
    });
    setSyncDot('ok');
  }catch(e){setSyncDot('err');toast('同步失敗，請確認 Integration 已加入資料庫',true)}
  renderList()
}

function onCustomerInput(){
  const q=document.getElementById('cust-input').value.trim();
  const dd=document.getElementById('cust-dropdown');
  selCustId=null; selCustName=q;
  clearTimeout(custTimer);
  if(!q){dd.style.display='none';return}
  custTimer=setTimeout(async()=>{
    try{
      const data=await notionAPI('POST',`databases/${CUSTOMER_DB}/query`,{
        page_size:8,
        filter:{property:'客戶名稱',title:{contains:q}}
      });
      const results=data.results||[];
      let html='';
      results.forEach(p=>{
        const props=p.properties||{};
        const titleKey=Object.keys(props).find(k=>props[k].type==='title');
        const name=titleKey?(props[titleKey].title||[]).map(t=>t.plain_text||'').join(''):'';
        if(name) html+=`<div class="cust-opt" onclick="selectCustomer('${attr(p.id)}','${attr(name)}')">👤 ${esc(name)}</div>`;
      });
      html+=`<div class="cust-opt cust-opt-new" onclick="useNewCustomer()">＋ 直接新增「${esc(q)}」為新客戶</div>`;
      dd.innerHTML=html;
      dd.style.display='block';
    }catch(e){
      const q2=document.getElementById('cust-input').value.trim();
      document.getElementById('cust-dropdown').innerHTML=`<div class="cust-opt cust-opt-new" onclick="useNewCustomer()">＋ 直接新增「${esc(q2)}」為新客戶</div>`;
      document.getElementById('cust-dropdown').style.display='block';
    }
  },300);
}

function selectCustomer(id,name){
  selCustId=id; selCustName=name;
  document.getElementById('cust-input-view').style.display='none';
  document.getElementById('cust-selected-name').textContent=name;
  document.getElementById('cust-selected-view').style.display='block';
  document.getElementById('cust-dropdown').style.display='none';
}

function useNewCustomer(){
  const name=document.getElementById('cust-input').value.trim();
  selCustId=null; selCustName=name;
  document.getElementById('cust-input-view').style.display='none';
  document.getElementById('cust-selected-name').textContent=name+' （新客戶）';
  document.getElementById('cust-selected-view').style.display='block';
  document.getElementById('cust-dropdown').style.display='none';
}

function clearCustomer(){
  selCustId=null; selCustName='';
  document.getElementById('cust-input-view').style.display='block';
  document.getElementById('cust-input').value='';
  document.getElementById('cust-selected-view').style.display='none';
  document.getElementById('cust-dropdown').style.display='none';
}

function resetAddForm(){
  clearCustomer();
  ['f-talked','f-next'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=''});
  const dateEl=document.getElementById('f-date');if(dateEl)dateEl.value=today;
  renderChPills('add-ch-pills',CHANNELS[0]);
}

function setFilter(el,v){document.querySelectorAll('.fpill').forEach(p=>p.classList.remove('on'));el.classList.add('on');filterCh=v;renderList()}

function renderList(){
  const searchWrap=document.getElementById('search-wrap');
  const channelFilters=document.getElementById('channel-filters');
  if(searchWrap)searchWrap.style.display=mode==='today'||mode==='customers'?'block':'none';
  if(channelFilters)channelFilters.style.display=mode==='interactions'?'flex':'none';
  if(mode==='today'){renderToday();return}
  if(mode==='customers'){renderCustomers();return}
  if(mode==='manager'){renderManager();return}
  const q=(document.getElementById('search-input')?.value||'').toLowerCase();
  const list=contacts.filter(c=>{
    const mq=!q||[c.name,c.talked,c.nextTopic].some(x=>(x||'').toLowerCase().includes(q));
    return mq&&(!filterCh||c.channel===filterCh);
  });
  const ts=document.getElementById('stat-total');const tt=document.getElementById('stat-today');
  if(ts)ts.textContent=contacts.length;
  if(tt)tt.textContent=todayInteractions().length;
  const el=document.getElementById('contacts-list');if(!el)return;
  if(!list.length){el.innerHTML='<div class="empty-state">找不到紀錄<br><span style="font-size:13px">點右下角 + 新增</span></div>';return}
  const cc=c=>{const cv=chColor(c.channel);return c.channel?`<span class="ch-badge" style="background:${cv.bg};color:${cv.c}">${esc(c.channel)}</span>`:''};
  el.innerHTML=list.map(c=>{const av=avColor(c.name);return`<div class="contact-item" onclick="showDetail('${attr(c.id)}')"><div class="avatar" title="編輯客戶資料" onclick="openCustomerPage(event,'${attr(c.customerId)}')" style="background:${av.bg};color:${av.c}">${esc(initials(c.name))}</div><div class="contact-info"><div class="contact-name">${esc(c.name)}</div><div class="contact-sub">${esc(c.talked||'尚無紀錄')}</div></div>${cc(c)}</div>`}).join('')
}

function renderTrackRow(c){
  const av=avColor(c.name);const due=dueLabel(c);
  const sub=[c.topic,c.status].filter(Boolean).join(' · ');
  return `<div class="track-row" onclick="openCustomerEdit('${attr(c.id)}')">
    <div class="avatar" style="background:${av.bg};color:${av.c}">${esc(initials(c.name))}</div>
    <div class="track-main"><div class="track-name">${esc(c.name)}</div><div class="track-sub">${esc(sub)}</div></div>
    <span class="due-badge ${due.tone}">${esc(due.text)}</span>
  </div>`;
}

function renderToday(){
  const q=(document.getElementById('search-input')?.value||'').toLowerCase();
  const active=customers.filter(c=>!q||[c.name,c.topic,c.status,c.grade].some(x=>(x||'').toLowerCase().includes(q)));
  const groups={A:[],B:[],C:[],D:[]};active.forEach(c=>groups[c.gradeKey]?.push(c));
  const count=groups.A.length+groups.B.length+groups.C.length+groups.D.length;
  const ts=document.getElementById('stat-total');const tt=document.getElementById('stat-today');
  if(ts)ts.textContent=customers.length;
  if(tt)tt.textContent=todayInteractions().length;
  const el=document.getElementById('contacts-list');if(!el)return;
  let html=`<div class="today-card"><div class="today-head"><div class="today-title">今日追蹤</div><div class="today-count">${count} 人</div></div>
    <div class="grade-tabs">
      <div class="grade-tab ${gradeFilter==='A'?'on':''}" onclick="gradeFilter='A';renderToday()">A 熱</div>
      <div class="grade-tab ${gradeFilter==='B'?'on':''}" onclick="gradeFilter='B';renderToday()">B 暖</div>
      <div class="grade-tab ${gradeFilter==='C'?'on':''}" onclick="gradeFilter='C';showC=true;renderToday()">C 維護</div>
      <div class="grade-tab ${gradeFilter==='D'?'on':''}" onclick="gradeFilter='D';renderToday()">D 存檔</div>
    </div>`;
  const labelMap={A:'A 級',B:'B 級',C:'C 級維護',D:'D 級存檔'};
  const list=groups[gradeFilter]||[];
  html+=`<div class="grade-section-label ${gradeFilter==='A'?'hot':''}">${labelMap[gradeFilter]} · ${list.length} 人</div>`;
  html+=list.length?list.map(renderTrackRow).join(''):`<div class="empty-state">這個分級目前沒有名單</div>`;
  html+='</div>';
  el.innerHTML=html;
}

function renderCustomers(){
  const q=(document.getElementById('search-input')?.value||'').toLowerCase();
  const list=customers.filter(c=>!q||[c.name,c.topic,c.status,c.grade].some(x=>(x||'').toLowerCase().includes(q)));
  const ts=document.getElementById('stat-total');const tt=document.getElementById('stat-today');
  if(ts)ts.textContent=customers.length;
  if(tt)tt.textContent=todayInteractions().length;
  const el=document.getElementById('contacts-list');if(!el)return;
  el.innerHTML='<div class="list-note">客戶列表會顯示全部 A/B/C/D 客戶；點客戶即可在 App 內編輯資料。</div>'+list.map(c=>{
    const av=avColor(c.name);
    return `<div class="contact-item" onclick="openCustomerEdit('${attr(c.id)}')"><div class="avatar" style="background:${av.bg};color:${av.c}">${esc(initials(c.name))}</div><div class="contact-info"><div class="contact-name">${esc(c.name)}</div><div class="contact-sub">${esc([c.grade,c.topic].filter(Boolean).join(' · '))}</div></div><span class="ch-badge" style="background:#f1f1f1;color:#555">${esc(c.grade)}</span></div>`;
  }).join('');
}

function renderManager(){
  const ts=document.getElementById('stat-total');const tt=document.getElementById('stat-today');
  if(ts)ts.textContent=contacts.length;if(tt)tt.textContent=todayInteractions().length;
  const el=document.getElementById('contacts-list');if(!el)return;
  const recent=contacts.slice(0,20);
  el.innerHTML='<div class="list-note">主管看板先顯示最近互動紀錄，後續可再接「回報主管」勾選清單與主管回饋欄位。</div>'+recent.map(c=>{
    const av=avColor(c.name);
    return `<div class="contact-item" onclick="showDetail('${attr(c.id)}')"><div class="avatar" style="background:${av.bg};color:${av.c}">${esc(initials(c.name))}</div><div class="contact-info"><div class="contact-name">${esc(c.name)}</div><div class="contact-sub">${esc(c.talked||'尚無紀錄')}</div></div></div>`;
  }).join('');
}

function todayInteractions(){
  return contacts.filter(c=>(c.lastContact||c.created)===today);
}

function showTodayFrame(){
  const frame=document.getElementById('today-frame');
  const listEl=document.getElementById('today-frame-list');
  if(!frame||!listEl)return;
  const list=todayInteractions();
  listEl.innerHTML=list.length?list.map(c=>`
    <div class="mini-item" onclick="hideTodayFrame();showDetail('${attr(c.id)}')">
      <div class="mini-name">${esc(c.name)}</div>
      <div class="mini-talk">${esc(c.talked||'尚無聊天內容')}</div>
      <div class="mini-meta">${esc(c.channel||'未填管道')} · ${esc(c.lastContact||c.created||'')}</div>
    </div>
  `).join(''):'<div class="mini-item"><div class="mini-talk">今天還沒有新增互動。</div></div>';
  frame.classList.add('show');
}

function hideTodayFrame(){
  document.getElementById('today-frame')?.classList.remove('show');
}

function openCustomerEdit(id){
  const c=customers.find(x=>normId(x.id)===normId(id));
  if(!c){toast('找不到客戶資料，請先重新整理',true);return}
  currentCustomerId=c.id;
  document.getElementById('ce-time').value=c.created||'';
  document.getElementById('ce-name').value=c.name||'';
  document.getElementById('ce-visit-purpose').value=c.visitPurpose||'';
  document.getElementById('ce-age').value=c.age||'';
  document.getElementById('ce-grade').value=c.grade||'';
  document.getElementById('ce-family').value=c.family||'';
  document.getElementById('ce-area').value=c.area||'';
  document.getElementById('ce-how-met').value=c.howMet||'';
  document.getElementById('ce-progress').value=c.progress||'';
  document.getElementById('ce-work').value=c.work||'';
  document.getElementById('ce-invest').value=c.invest||'';
  document.getElementById('ce-competitor').value=c.competitor||'';
  document.getElementById('ce-decision').value=c.decision||'';
  document.getElementById('ce-policy').value=c.policy||'';
  document.getElementById('ce-next-topic').value=c.nextTopic||'';
  document.getElementById('ce-salary').value=c.salary||'';
  document.getElementById('ce-goal').value=c.goal||'';
  document.getElementById('ce-note').value=c.note||'';
  document.getElementById('ce-policy-summary').value=c.policySummary||'';
  document.getElementById('ce-policy-checkup').value=c.policyCheckup||'';
  renderCustomerHistory(c.id);
  setCustomerTab('history');
  showView('customer-edit');
}

function setCustomerTab(tab){
  document.getElementById('customer-tab-kyc')?.classList.toggle('on',tab==='kyc');
  document.getElementById('customer-tab-history')?.classList.toggle('on',tab==='history');
  document.getElementById('customer-panel-kyc')?.classList.toggle('on',tab==='kyc');
  document.getElementById('customer-panel-history')?.classList.toggle('on',tab==='history');
}

function renderCustomerHistory(customerId){
  const el=document.getElementById('ce-history');if(!el)return;
  const list=contacts
    .filter(x=>normId(x.customerId)===normId(customerId))
    .sort((a,b)=>(b.createdTime||b.created||'').localeCompare(a.createdTime||a.created||''));
  if(!list.length){el.innerHTML='<div class="timeline-empty">尚無互動紀錄。可以從這裡新增第一筆。</div>';return}
  el.innerHTML=list.map(x=>`
    <div class="timeline-item" data-id="${attr(x.id)}">
      <div class="timeline-content" onclick="openInteractionFromTimeline(event,'${attr(x.id)}')" oncontextmenu="showInteractionSheet(event,'${attr(x.id)}')" onpointerdown="startLongPress(event,'${attr(x.id)}')" onpointerup="clearLongPress()" onpointercancel="clearLongPress()" onpointerleave="clearLongPress()">
        <div class="timeline-meta"><span>${esc(x.lastContact||x.created||'')}</span>${x.channel?`<span class="ch-badge" style="background:${chColor(x.channel).bg};color:${chColor(x.channel).c}">${esc(x.channel)}</span>`:''}</div>
        <div class="timeline-talk">${esc(x.talked||'尚無聊天內容')}</div>
        ${x.nextTopic?`<div class="timeline-next">下次話題：${esc(x.nextTopic)}</div>`:''}
      </div>
    </div>
  `).join('');
}

let longPressTimer=null;
let sheetInteractionId=null;
let longPressOpened=false;
function clearTextSelection(){
  const sel=window.getSelection?.();
  if(sel&&!sel.isCollapsed)sel.removeAllRanges();
}
function startLongPress(e,id){
  clearLongPress();
  clearTextSelection();
  longPressTimer=setTimeout(()=>{
    longPressOpened=true;
    clearTextSelection();
    showInteractionSheet(e,id);
  },520);
}
function clearLongPress(){
  clearTimeout(longPressTimer);
  longPressTimer=null;
}
function openInteractionFromTimeline(e,id){
  if(longPressOpened){
    e?.preventDefault();
    e?.stopPropagation();
    setTimeout(()=>{longPressOpened=false},0);
    return;
  }
  showDetail(id);
}
function showInteractionSheet(e,id){
  if(e){e.preventDefault();e.stopPropagation();}
  clearTextSelection();
  sheetInteractionId=id;
  const item=contacts.find(x=>normId(x.id)===normId(id));
  const title=document.getElementById('sheet-title');
  if(title)title.textContent=item?`${item.name} · ${item.lastContact||item.created||''}`:'互動操作';
  document.getElementById('interaction-sheet')?.classList.add('show');
}
function hideInteractionSheet(){
  document.getElementById('interaction-sheet')?.classList.remove('show');
  sheetInteractionId=null;
}
function openSheetInteraction(){
  const id=sheetInteractionId;
  hideInteractionSheet();
  if(id)showDetail(id);
}
function deleteSheetInteraction(){
  const id=sheetInteractionId;
  hideInteractionSheet();
  if(id)deleteInteraction(null,id);
}

async function deleteInteraction(e,id){
  if(e){e.preventDefault();e.stopPropagation();}
  const item=contacts.find(x=>normId(x.id)===normId(id));
  if(!item)return;
  if(!confirm(`刪除這筆互動？\n${item.name}：${item.talked||'尚無內容'}`))return;
  try{
    await notionAPI('PATCH',`pages/${id}`,{archived:true});
    contacts=contacts.filter(x=>normId(x.id)!==normId(id));
    toast('已刪除互動');
    renderCustomerHistory(currentCustomerId);
    const tt=document.getElementById('stat-today');if(tt)tt.textContent=todayInteractions().length;
  }catch(err){
    toast('刪除失敗：'+err.message,true);
  }
}

function startInteractionForCustomer(){
  const c=customers.find(x=>normId(x.id)===normId(currentCustomerId));
  if(!c)return;
  showView('add');
  selectCustomer(c.id,c.name);
}

function buildCustomerProps(d){
  const p={};
  if(d.name!==undefined)p['客戶名稱']={title:[{text:{content:d.name||'未命名'}}]};
  if(d.visitPurpose!==undefined)p['③約訪目的']={multi_select:splitOptions(d.visitPurpose).map(name=>({name}))};
  if(d.grade!==undefined)p['分級']=d.grade?{select:{name:d.grade}}:{select:null};
  if(d.family!==undefined)p['家庭現況']={rich_text:[{text:{content:d.family||''}}]};
  if(d.area!==undefined)p['住家']={rich_text:[{text:{content:d.area||''}}]};
  if(d.howMet!==undefined)p['怎麼認識']={email:d.howMet||null};
  if(d.progress!==undefined)p['目前進度']={multi_select:splitOptions(d.progress).map(name=>({name}))};
  if(d.work!==undefined)p['工作狀態']={email:d.work||null};
  if(d.invest!==undefined)p['投資狀況']={email:d.invest||null};
  if(d.competitor!==undefined)p['競爭者']={email:d.competitor||null};
  if(d.decision!==undefined)p['決策者']={rich_text:[{text:{content:d.decision||''}}]};
  if(d.policy!==undefined&&validUrl(d.policy))p['現有保單']={url:d.policy||null};
  if(d.nextTopic!==undefined)p['下次見面主題']={rich_text:[{text:{content:d.nextTopic||''}}]};
  if(d.salary!==undefined&&validNumber(d.salary))p['薪水']={number:d.salary?Number(d.salary):null};
  if(d.goal!==undefined)p['目標']={rich_text:[{text:{content:d.goal||''}}]};
  if(d.note!==undefined)p['配置建議']={rich_text:[{text:{content:d.note||''}}]};
  if(d.policySummary!==undefined&&validUrl(d.policySummary))p['保單統整']={url:d.policySummary||null};
  if(d.policyCheckup!==undefined&&validUrl(d.policyCheckup))p['保單健檢']={url:d.policyCheckup||null};
  return p;
}

async function saveCustomerEdit(){
  if(!currentCustomerId)return;
  const btn=document.getElementById('ce-save');
  if(btn){btn.disabled=true;btn.innerHTML='<div class="spinner"></div>'}
  const updates={
    name:document.getElementById('ce-name').value.trim(),
    visitPurpose:document.getElementById('ce-visit-purpose').value.trim(),
    grade:document.getElementById('ce-grade').value,
    family:document.getElementById('ce-family').value.trim(),
    area:document.getElementById('ce-area').value.trim(),
    howMet:document.getElementById('ce-how-met').value.trim(),
    progress:document.getElementById('ce-progress').value.trim(),
    work:document.getElementById('ce-work').value.trim(),
    invest:document.getElementById('ce-invest').value.trim(),
    competitor:document.getElementById('ce-competitor').value.trim(),
    decision:document.getElementById('ce-decision').value.trim(),
    policy:document.getElementById('ce-policy').value.trim(),
    nextTopic:document.getElementById('ce-next-topic').value.trim(),
    salary:document.getElementById('ce-salary').value.trim(),
    goal:document.getElementById('ce-goal').value.trim(),
    note:document.getElementById('ce-note').value.trim(),
    policySummary:document.getElementById('ce-policy-summary').value.trim(),
    policyCheckup:document.getElementById('ce-policy-checkup').value.trim(),
  };
  try{
    if(updates.policy&&!validUrl(updates.policy))toast('現有保單不是網址，已略過這欄',true);
    if(updates.policySummary&&!validUrl(updates.policySummary))toast('保單統整不是網址，已略過這欄',true);
    if(updates.policyCheckup&&!validUrl(updates.policyCheckup))toast('保單健檢不是網址，已略過這欄',true);
    if(updates.salary&&!validNumber(updates.salary))toast('薪水不是數字，已略過這欄',true);
    await notionAPI('PATCH',`pages/${currentCustomerId}`,{properties:buildCustomerProps(updates)});
    const c=customers.find(x=>normId(x.id)===normId(currentCustomerId));
    if(c){
      Object.assign(c,updates,{gradeKey:gradeKey(updates.grade),topic:updates.nextTopic||c.topic,status:updates.progress||c.status});
      contacts.forEach(r=>{if(normId(r.customerId)===normId(currentCustomerId))r.name=updates.name||r.name});
    }
    toast('客戶資料已更新');
    showView('list');
  }catch(e){
    toast('更新失敗：'+e.message,true);
  }
  if(btn){btn.disabled=false;btn.innerHTML='更新客戶'}
}

function renderChPills(id,cur){
  const el=document.getElementById(id);if(!el)return;
  let chosen=cur||CHANNELS[0];
  const r=()=>{el.innerHTML=CHANNELS.map(s=>`<div class="ch-pill${s===chosen?' on':''}" onclick="this.parentElement._pick('${attr(s)}')">${esc(s)}</div>`).join('')};
  el._pick=s=>{chosen=s;r()};el._get=()=>chosen;r();
}

function showDetail(id){currentId=id;editMode=false;const c=contacts.find(x=>x.id===id);if(!c)return;document.getElementById('detail-title').textContent=c.name;document.getElementById('edit-btn').textContent='✏️';renderDetailView(c);showView('detail')}

function renderDetailView(c){
  const av=avColor(c.name);const cc=chColor(c.channel);
  document.getElementById('detail-body').innerHTML=`
    <div class="detail-avatar" title="編輯客戶資料" onclick="openCustomerPage(event,'${attr(c.customerId)}')" style="background:${av.bg};color:${av.c};cursor:pointer">${esc(initials(c.name))}</div>
    <div class="detail-name">${esc(c.name)}</div>
    <div class="detail-meta">${c.channel?`<span class="ch-badge" style="background:${cc.bg};color:${cc.c};display:inline-block;margin-right:6px">${esc(c.channel)}</span>`:''}<span style="font-size:13px;color:var(--text3)">${esc(c.lastContact||'')}</span></div>
    <div class="field-group">
      <hr class="divider" style="margin-top:0">
      <div class="field-row"><div class="field-label">聊了什麼</div><div class="field-value">${esc(c.talked||'尚無紀錄')}</div></div>
      <hr class="divider">
      <div class="field-row"><div class="field-label">下次話題</div><div class="field-value" style="${c.nextTopic?'':'color:var(--text3)'}">${esc(c.nextTopic||'尚未設定')}</div></div>
    </div>
    <hr class="divider">
    <div class="add-log-btn" onclick="showUpdateLog('${attr(c.id)}')">＋ 更新今天的互動</div>`;
}

function renderDetailEdit(c){
  document.getElementById('detail-body').innerHTML=`
    <div style="height:16px"></div>
    <div class="field-group">
      <div class="field-row"><div class="field-label">管道</div><div class="ch-pills" id="edit-ch-pills"></div></div>
      <div class="field-row"><div class="field-label">聊了什麼</div><textarea class="field-input" id="e-talked" rows="4">${esc(c.talked)}</textarea></div>
      <div class="field-row"><div class="field-label">下次話題</div><textarea class="field-input" id="e-next" rows="2">${esc(c.nextTopic)}</textarea></div>
    </div>
    <button class="btn-primary" id="save-btn" onclick="saveEdit('${attr(c.id)}')">儲存並同步</button>
    <button class="btn-secondary" onclick="toggleEdit()">取消</button>
    <div style="height:16px"></div>`;
  renderChPills('edit-ch-pills',c.channel);
}

function toggleEdit(){const c=contacts.find(x=>x.id===currentId);if(!c)return;editMode=!editMode;document.getElementById('edit-btn').textContent=editMode?'✕':'✏️';if(editMode)renderDetailEdit(c);else renderDetailView(c)}

function showUpdateLog(id){
  document.querySelector('.add-log-btn')?.remove();
  const body=document.getElementById('detail-body');
  const f=document.createElement('div');
  f.style.cssText='padding:12px 16px;border-top:0.5px solid var(--border)';
  f.innerHTML=`<div class="field-label" style="margin-bottom:8px">今天聊了什麼</div><textarea class="field-input" id="log-talked" rows="3" placeholder="更新互動內容..."></textarea><div class="field-label" style="margin:10px 0 6px">下次話題（選填）</div><textarea class="field-input" id="log-next" rows="2" placeholder="下次要聊的事..."></textarea><div style="margin-top:10px"><button class="btn-primary" style="margin:0;padding:10px;font-size:14px" onclick="submitLog('${attr(id)}')">記錄並同步</button></div>`;
  body.appendChild(f);f.querySelector('textarea').focus();
}

async function submitLog(id){
  const talked=document.getElementById('log-talked')?.value?.trim();
  if(!talked){toast('請輸入內容',true);return}
  const c=contacts.find(x=>x.id===id);if(!c)return;
  const next=document.getElementById('log-next')?.value?.trim()||c.nextTopic;
  await patchNotion(id,{talked,nextTopic:next,lastContact:today,channel:c.channel});
  c.talked=talked;c.nextTopic=next;c.lastContact=today;
  toast('已記錄！');renderDetailView(c);
}

function buildProps(d){
  const p={};
  if(d.title||d.name)p['標題']={title:[{text:{content:d.title||d.name}}]};
  if(d.customerId)p['客戶']={relation:[{id:d.customerId}]};
  if(d.channel)p['管道']={select:{name:d.channel}};
  if(d.talked!==undefined)p['聊了什麼']={rich_text:[{text:{content:d.talked||''}}]};
  if(d.nextTopic!==undefined)p['下次話題']={rich_text:[{text:{content:d.nextTopic||''}}]};
  if(d.lastContact)p['最後聯絡日期']={date:{start:d.lastContact}};
  return p;
}

async function submitContact(){
  if(!selCustName){toast('請輸入客戶姓名',true);return}
  const btn=document.getElementById('add-btn');btn.disabled=true;btn.innerHTML='<div class="spinner"></div>';
  let custId=selCustId;
  try{
    if(!custId){
      const newCust=await notionAPI('POST','pages',{
        parent:{database_id:CUSTOMER_DB},
        properties:{'客戶名稱':{title:[{text:{content:selCustName}}]}}
      });
      custId=newCust.id;
    }
    const interactionDate=document.getElementById('f-date')?.value||today;
    const data={customerId:custId,name:selCustName,channel:document.getElementById('add-ch-pills')?._get()||'',talked:document.getElementById('f-talked').value.trim(),nextTopic:document.getElementById('f-next').value.trim(),lastContact:interactionDate,created:today,createdTime:new Date().toISOString()};
    const res=await notionAPI('POST','pages',{parent:{database_id:dbId},properties:buildProps(data)});
    data.id=res.id;contacts.unshift(data);
    toast('已新增並同步！');showView('list');
  }catch(e){toast('同步失敗：'+e.message,true)}
  btn.disabled=false;btn.innerHTML='新增並同步到 Notion';
}

async function saveEdit(id){
  const btn=document.getElementById('save-btn');if(btn){btn.disabled=true;btn.innerHTML='<div class="spinner"></div>'}
  const c=contacts.find(x=>x.id===id);if(!c)return;
  const updates={channel:document.getElementById('edit-ch-pills')?._get()||c.channel,talked:document.getElementById('e-talked').value.trim(),nextTopic:document.getElementById('e-next').value.trim(),lastContact:c.lastContact};
  try{await patchNotion(id,updates);Object.assign(c,updates);toast('已儲存！');editMode=false;document.getElementById('edit-btn').textContent='✏️';renderDetailView(c)}
  catch(e){toast('儲存失敗',true);if(btn){btn.disabled=false;btn.innerHTML='儲存並同步'}}
}

async function patchNotion(id,data){if(!id)return;await notionAPI('PATCH',`pages/${id}`,{properties:buildProps(data)})}

document.addEventListener('click',e=>{if(!e.target.closest('#customer-wrap'))document.getElementById('cust-dropdown').style.display='none'});

window.addEventListener('DOMContentLoaded',()=>{
  renderChPills('add-ch-pills',CHANNELS[0]);
  const saved=localStorage.getItem(DB_KEY);
  if(saved){dbId=saved;showView('list');loadContacts()}else showView('setup');
});
</script>
</body>
</html>
